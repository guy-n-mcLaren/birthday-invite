<div class="container">
    <div class="envelope-flipper" id="flipper">
        <div class="env-front">
            <div class="calligraphy-text" id="envelopeGuestName">Guest Name</div>
        </div>

        <div class="env-back">
            <div class="flap"></div>
            <div class="back-fold"></div>
            
            <div class="card" id="inviteCard">
                <img src="invite-design.png" alt="Party Invite" class="invite-image">
                <form id="rsvpForm">
                    <input type="hidden" id="guestNameInput">
                    <div class="button-group">
                        <button type="submit" name="status" value="yes" class="btn btn-yes">Yes!</button>
                        <button type="submit" name="status" value="no" class="btn btn-no">No</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
