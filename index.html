<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>A Special Invite for You</title>
    <meta property="og:title" content="You're Invited! ✨" />
    <meta property="og:description" content="Click here for a special invite. Get ready to boogie!" />
    <meta property="og:image" content="https://yourusername.github.io/your-repo/invite-design.png" />
    <meta property="og:url" content="https://yourusername.github.io/your-repo/" />
    <meta property="og:type" content="website" />

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Shrikhand&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="envelope-flipper" id="flipper">
            
            <div class="env-front">
                <div class="calligraphy-text" id="envelopeGuestName">
                    Loading...
                </div>
            </div>

            <div class="env-back">
                <div class="flap"></div>
                <div class="back-fold"></div>
                
                <div class="card" id="inviteCard">
                    <img src="invite-design.png" alt="Party Invitation" class="invite-image">
                    
                    <form id="rsvpForm">
                        <input type="hidden" id="guestNameInput">
                        
                        <div class="button-group">
                            <button type="submit" name="status" value="yes" class="btn btn-yes">
                                yeah baby, that's groovy
                            </button>
                            <button type="submit" name="status" value="no" class="btn btn-no">
                                no go daddy-o
                            </button>
                        </div>

                        <p class="deadline-text">please rsvp by the 25th June</p>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
